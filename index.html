<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آمیرزایاب هوشمند - متصل به JSON</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap');
        * { box-sizing: border-box; font-family: 'Vazirmatn', Tahoma, sans-serif; margin: 0; padding: 0; }
        body { background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #333; }
        .container { background: #ffffff; width: 100%; max-width: 750px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); padding: 30px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 28px; color: #2c3e50; font-weight: 900; margin-bottom: 8px; }
        .header p { font-size: 14px; color: #7f8c8d; }
        .input-section { background: #f8f9fa; padding: 20px; border-radius: 16px; border: 2px dashed #34495e; margin-bottom: 25px; }
        .input-label { font-weight: 700; font-size: 15px; color: #2c3e50; margin-bottom: 10px; display: block; }
        .input-wrapper { display: flex; gap: 12px; }
        input[type="text"] { flex: 1; padding: 14px 20px; font-size: 20px; border: 2px solid #dcdde1; border-radius: 12px; text-align: center; font-weight: 700; color: #2c3e50; transition: all 0.3s; }
        input[type="text"]:focus { outline: none; border-color: #e67e22; box-shadow: 0 0 12px rgba(230, 126, 34, 0.3); }
        button { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); color: white; border: none; padding: 0 35px; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(230, 126, 34, 0.4); }
        .stats-bar { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #666; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #edf2f7; }
        .results-container { max-height: 480px; overflow-y: auto; padding-right: 5px; }
        .length-group { margin-bottom: 20px; }
        .length-title { font-size: 15px; font-weight: 700; color: #d35400; background: #fdf2e9; padding: 6px 14px; border-radius: 8px; display: inline-block; margin-bottom: 12px; }
        .words-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .word-badge { background: #fff; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 10px; font-size: 16px; font-weight: 700; color: #2d3748; box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: all 0.2s; }
        .word-badge:hover { background: #f1f2f6; border-color: #e67e22; transform: scale(1.05); }
        .no-result { text-align: center; padding: 40px 20px; color: #a0aec0; font-size: 15px; }
        .error-msg { color: #c0392b; background: #fde8e8; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>آمیرزایاب متصل به دیتابیس JSON</h1>
            <p>این برنامه اطلاعات کلمات را به صورت پویا از فایل JSON جانبی می‌خواند.</p>
        </div>

        <div class="input-section">
            <label class="input-label">حروف مورد نظر را وارد کنید:</label>
            <div class="input-wrapper">
                <input type="text" id="lettersInput" placeholder="مثال: م ر ب ا" autocomplete="off" autofocus disabled>
                <button id="searchBtn" onclick="findWords()" disabled>بارگذاری...</button>
            </div>
        </div>

        <div class="stats-bar">
            <span id="wordCount">کلمات پیدا شده: ۰</span>
            <span id="dbCount">در حال اتصال به فایل JSON...</span>
        </div>

        <div class="results-container" id="resultsBox">
            <div class="no-result">منتظر بارگذاری بانک کلمات...</div>
        </div>
    </div>

    <script {is_g_search_disabled=true}>
        let amirzaDatabase = [];

        // تابع لود کردن دینامیک فایل JSON
        async function loadDatabase() {
            const dbCountElement = document.getElementById('dbCount');
            const resultsBox = document.getElementById('resultsBox');
            const inputField = document.getElementById('lettersInput');
            const searchBtn = document.getElementById('searchBtn');

            try {
                // خواندن فایل از کنار پوسته اصلی
                const response = await fetch('words.json');
                if (!response.ok) throw new Error('فایل words.json پیدا نشد یا فرمت آن اشتباه است.');
                
                const data = await response.json();
                
                // یکتا سازی و مرتب سازی کلمات
                amirzaDatabase = Array.from(new Set(
                    data.map(w => w.replace(/ي/g, 'ی').replace(/ك/g, 'ک').trim())
                        .filter(w => w.length >= 3)
                )).sort((a, b) => b.length - a.length || a.localeCompare(b));

                dbCountElement.innerText = `کل واژگان دیتابیس لوکال: ${amirzaDatabase.length} کلمه`;
                resultsBox.innerHTML = '<div class="no-result">دیتابیس با موفقیت لود شد. حروف را وارد کرده و جستجو کنید.</div>';
                
                // فعال کردن ابزارها پس از لود موفق
                inputField.disabled = false;
                searchBtn.disabled = false;
                searchBtn.innerText = "جستجو";

            } catch (error) {
                console.error(error);
                dbCountElement.innerText = "خطا در بارگذاری!";
                resultsBox.innerHTML = `<div class="error-msg">⚠️ خطا: مطمئن شوید فایل words.json درست در کنار این فایل HTML قرار دارد و آن را با یک لوکال سرور (مثل VS Code Live Server) باز کرده‌اید.</div>`;
            }
        }

        function getLetterCounts(str) {
            const counts = {};
            const cleanStr = str.replace(/\s+/g, '').replace(/‌/g, '').trim();
            for (let char of cleanStr) { counts[char] = (counts[char] || 0) + 1; }
            return counts;
        }

        function findWords() {
            const inputVal = document.getElementById('lettersInput').value.trim();
            const resultsBox = document.getElementById('resultsBox');
            const wordCountElement = document.getElementById('wordCount');
            
            if (!inputVal) {
                resultsBox.innerHTML = '<div class="no-result">لطفاً ابتدا چند حرف وارد کنید.</div>';
                wordCountElement.innerText = "کلمات پیدا شده: ۰";
                return;
            }

            const userLetterCounts = getLetterCounts(inputVal);
            const maxLen = inputVal.replace(/\s+/g, '').length;
            const matchedWords = [];

            for (let word of amirzaDatabase) {
                if (word.length > maxLen) continue;

                const wordLetterCounts = getLetterCounts(word);
                let canBeFormed = true;

                for (let char in wordLetterCounts) {
                    if (!userLetterCounts[char] || wordLetterCounts[char] > userLetterCounts[char]) {
                        canBeFormed = false;
                        break;
                    }
                }
                if (canBeFormed) { matchedWords.push(word); }
            }

            resultsBox.innerHTML = '';
            if (matchedWords.length === 0) {
                resultsBox.innerHTML = '<div class="no-result">هیچ کلمه‌ای پیدا نشد!</div>';
                wordCountElement.innerText = "کلمات پیدا شده: ۰";
                return;
            }

            wordCountElement.innerText = `کلمات پیدا شده: ${matchedWords.length}`;

            const groups = {};
            matchedWords.forEach(word => {
                const len = word.length;
                if (!groups[len]) groups[len] = [];
                groups[len].push(word);
            });

            const sortedLengths = Object.keys(groups).map(Number).sort((a, b) => b - a);

            sortedLengths.forEach(len => {
                const lengthGroupDiv = document.createElement('div');
                lengthGroupDiv.className = 'length-group';

                const title = document.createElement('div');
                title.className = 'length-title';
                title.innerText = `${len} حرفی (${groups[len].length} کلمه)`;
                lengthGroupDiv.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'words-grid';

                groups[len].sort().forEach(word => {
                    const badge = document.createElement('span');
                    badge.className = 'word-badge';
                    badge.innerText = word;
                    grid.appendChild(badge);
                });

                lengthGroupDiv.appendChild(grid);
                resultsBox.appendChild(lengthGroupDiv);
            });
        }

        document.getElementById('lettersInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { findWords(); }
        });

        // اجرای تابع لود دیتابیس در شروع برنامه
        window.onload = loadDatabase;
    </script>
</body>
</html>
